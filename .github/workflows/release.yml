name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run tests
        run: ./gradlew :tessera:test :tessera-hilt:test

      - name: Build release AARs
        run: ./gradlew :tessera:assembleRelease :tessera-hilt:assembleRelease

      - name: Stage AAR artifacts
        run: |
          mkdir -p release-artifacts
          cp tessera/build/outputs/aar/tessera-release.aar release-artifacts/tessera-${{ github.ref_name }}.aar
          cp tessera-hilt/build/outputs/aar/tessera-hilt-release.aar release-artifacts/tessera-hilt-${{ github.ref_name }}.aar

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-artifacts/tessera-${{ github.ref_name }}.aar
            release-artifacts/tessera-hilt-${{ github.ref_name }}.aar
          body: |
            ## Tessera ${{ github.ref_name }}

            Install via JitPack:

            ```kotlin
            dependencies {
                implementation("com.github.chisarabiVorts.tessera:tessera:${{ github.ref_name }}")
                implementation("com.github.chisarabiVorts.tessera:tessera-hilt:${{ github.ref_name }}")
            }
            ```

            See [CHANGELOG.md](https://github.com/chisarabiVorts/tessera/blob/${{ github.ref_name }}/CHANGELOG.md) for full changes.

            ---
